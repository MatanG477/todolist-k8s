apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  template:
    spec:
      initContainers:
      - name: wait-for-mysql
        image: busybox:latest
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting for MySQL on mariadb-headless:3306..."
          until nc -z mariadb-headless 3306; do
            echo "still waiting..."
            sleep 2
          done
          echo "MySQL is up, starting frontend"
