apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: movies.example.com
spec:
  group: example.com
  scope: Namespaced
  names:
    plural: movies
    singular: movie
    kind: Movie
    shortNames:
    - mv
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              title:
                type: string
              director:
                type: string
              year:
                type: integer
              rating:
                type: number
