apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: todolist-vue-netpol
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: todolist-vue
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
          podSelector:
            matchLabels:
              app: traefik
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: todos-api
      ports:
        - protocol: TCP
          port: 8080

