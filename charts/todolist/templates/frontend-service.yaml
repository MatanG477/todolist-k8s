apiVersion: v1
kind: Service
metadata:
  labels:
    app: frontend-service
  name: frontend-service
spec:
  ports:
  - name: 5000-5000
    port: {{ .Values.frontend.service.port }}
    protocol: TCP
    targetPort: 5000
  selector:
    app: frontend
  type: {{ .Values.frontend.service.type }}
status:
  loadBalancer: {}
